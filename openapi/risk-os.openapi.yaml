openapi: 3.1.0
info:
  title: Civilis Risk OS API
  version: 0.1.0
  summary: Reusable protection surface for agent commerce on X Layer
  description: >
    Minimal public API contract for the Civilis Risk OS installable skill.
    This spec covers the narrow protected-commerce flow:
    quote -> buy -> claim -> resolve -> requote.
servers:
  - url: https://civilis-risk-os-runtime.ceolaexekiel.workers.dev
    description: Public hosted bundled runtime
  - url: https://<compatible-risk-os-runtime>
    description: Compatible Risk OS runtime
tags:
  - name: risk
  - name: intel
paths:
  /api/risk/quote/intel:
    post:
      tags: [risk]
      summary: Quote a protected intel purchase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [intelItemId, buyerAgentId]
              properties:
                intelItemId:
                  type: integer
                buyerAgentId:
                  type: string
      responses:
        '200':
          description: Risk quote created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RiskQuoteResponse'
  /api/intel/items/{id}/buy:
    post:
      tags: [intel]
      summary: Execute an intel purchase through the instant or challengeable path
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [buyerAgentId, purchaseMode, quoteId]
              properties:
                buyerAgentId:
                  type: string
                purchaseMode:
                  type: string
                  enum: [instant, challengeable]
                quoteId:
                  type: integer
      responses:
        '200':
          description: Protected purchase executed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectedPurchaseExecutionResponse'
  /api/risk/purchases/{id}:
    get:
      tags: [risk]
      summary: Query the aggregated protected purchase view
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Protected purchase view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProtectedPurchaseViewResponse'
        '404':
          description: Protected purchase not found
  /api/risk/purchases/{id}/claim-proof:
    get:
      tags: [risk]
      summary: Fetch the deterministic buyer claim-proof message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: claimType
          required: true
          schema:
            type: string
        - in: query
          name: reasonText
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Claim-proof prepared
  /api/risk/claims:
    post:
      tags: [risk]
      summary: File a protected claim as the buyer
      parameters:
        - in: header
          name: x-civilis-risk-claimant-token
          required: false
          schema:
            type: string
        - in: header
          name: x-civilis-risk-claimant-signature
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimRequest'
      responses:
        '200':
          description: Claim created
        '403':
          description: Missing or invalid claimant proof
  /api/risk/claims/{id}/resolve-proof:
    get:
      tags: [risk]
      summary: Fetch the deterministic evaluator resolve-proof message
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: query
          name: decision
          required: true
          schema:
            type: string
            enum: [release, refund]
        - in: query
          name: decisionReason
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolve-proof prepared
  /api/risk/claims/{id}/resolve:
    post:
      tags: [risk]
      summary: Resolve a claim as the evaluator
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: header
          name: x-civilis-risk-evaluator-token
          required: false
          schema:
            type: string
        - in: header
          name: x-civilis-risk-evaluator-signature
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResolveRequest'
      responses:
        '200':
          description: Claim resolved
        '403':
          description: Missing or invalid evaluator proof
  /health:
    get:
      tags: [risk]
      summary: Inspect proof environment readiness
      responses:
        '200':
          description: Health payload
components:
  schemas:
    RiskQuoteResponse:
      type: object
      required:
        - quote_id
        - intel_item_id
        - buyer_agent_id
        - seller_agent_id
        - risk_score
        - recommended_mode
        - premium_bps
        - premium_amount
        - claim_window_seconds
        - reasons
        - expires_at
      properties:
        quote_id:
          type: integer
        intel_item_id:
          type: integer
        buyer_agent_id:
          type: string
        seller_agent_id:
          type: string
        risk_score:
          type: integer
        recommended_mode:
          type: string
          enum: [instant, challengeable]
        premium_bps:
          type: integer
        premium_amount:
          oneOf:
            - type: number
            - type: string
        claim_window_seconds:
          type: integer
        reasons:
          type: array
          items:
            type: string
        expires_at:
          type: string
    ProtectedPurchaseExecutionResponse:
      type: object
      required:
        - success
        - settlementMode
        - purchaseMode
        - protected_purchase_id
        - buyer_agent_id
        - seller_agent_id
        - status
        - principal_amount
        - premium_amount
      properties:
        success:
          type: boolean
        settlementMode:
          type: string
          enum: [record_only, acp_funded]
        purchaseMode:
          type: string
          enum: [instant, challengeable]
        acpJobId:
          type:
            - integer
            - 'null'
        onChainJobId:
          type:
            - integer
            - 'null'
        onChainTxHash:
          type:
            - string
            - 'null'
        protected_purchase_id:
          type: integer
        quote_id:
          type:
            - integer
            - 'null'
        intel_item_id:
          type: integer
        buyer_agent_id:
          type: string
        seller_agent_id:
          type: string
        status:
          type: string
          enum: [pending_acp_job, challenge_window, claimed, released, refunded]
        principal_amount:
          type: string
        premium_amount:
          type: string
        evaluator_address:
          type:
            - string
            - 'null'
        challenge_deadline:
          type:
            - string
            - 'null'
        content: {}
        claim:
          type:
            - object
            - 'null'
    ProtectedPurchaseViewResponse:
      type: object
      required:
        - protected_purchase_id
        - buyer_agent_id
        - seller_agent_id
        - purchase_mode
        - status
        - principal_amount
        - premium_amount
        - created_at
      properties:
        protected_purchase_id:
          type: integer
        quote_id:
          type:
            - integer
            - 'null'
        intel_item_id:
          type: integer
        buyer_agent_id:
          type: string
        seller_agent_id:
          type: string
        purchase_mode:
          type: string
          enum: [instant, challengeable]
        status:
          type: string
          enum: [pending_acp_job, challenge_window, claimed, released, refunded]
        principal_amount:
          type: string
        premium_amount:
          type: string
        acp_job_id:
          type:
            - integer
            - 'null'
        evaluator_address:
          type:
            - string
            - 'null'
        challenge_deadline:
          type:
            - string
            - 'null'
        settled_at:
          type:
            - string
            - 'null'
        created_at:
          type: string
        claim:
          type:
            - object
            - 'null'
    ClaimRequest:
      type: object
      required:
        - protectedPurchaseId
        - claimType
        - reasonText
      properties:
        protectedPurchaseId:
          type: integer
        claimType:
          type: string
          enum: [misleading_or_invalid_intel]
        reasonText:
          type: string
        evidence:
          type: object
    ResolveRequest:
      type: object
      required:
        - decision
        - decisionReason
      properties:
        decision:
          type: string
          enum: [release, refund]
        decisionReason:
          type: string
